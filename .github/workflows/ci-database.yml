name: ci-database

on:
  push:
    branches:
      - main
      - alpha-release
    paths:
      - "database/**"
      - ".github/workflows/ci-database.yml"
  pull_request:
    branches: [main]
    paths:
      - "database/**"
      - ".github/workflows/ci-database.yml"

env:
  IMAGE_NAME: devops-porto-get-together-database
  IMAGE_TAG: 0.0.${{ github.run_number }}

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate migration file naming convention
        run: |
          cd database/migrations
          for f in *.sql; do
            if ! echo "$f" | grep -qE '^V[0-9]+(\.[0-9]+)?__[a-zA-Z0-9_]+\.sql$'; then
              echo "Invalid migration filename: $f"
              echo "Expected format: V<version>__<description>.sql"
              exit 1
            fi
          done
          echo "All migration filenames are valid"

  build-and-push:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} ./database

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

  update-k8s-config:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout config repo
        uses: actions/checkout@v4
        with:
          repository: eduardopiairo/cicd-pipeline-workshop-config
          token: ${{ secrets.GH_PAT }}
          ref: alpha-release

      - name: Update database image tag
        run: |
          sed -i "s|image: .*${{ env.IMAGE_NAME }}:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}|" k8s/database/deployment.yaml

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b update-database-tag-${{ env.IMAGE_TAG }}
          git add k8s/database/deployment.yaml
          git commit -m "chore: update database image tag to ${{ env.IMAGE_TAG }}"
          git push origin update-database-tag-${{ env.IMAGE_TAG }}
          gh pr create \
            --repo eduardopiairo/cicd-pipeline-workshop-config \
            --title "chore: update database image tag to ${{ env.IMAGE_TAG }}" \
            --body "Automated PR to update database image tag to \`${{ env.IMAGE_TAG }}\`." \
            --base alpha-release