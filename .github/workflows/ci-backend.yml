name: ci-backend

on:
  push:
    branches:
      - main
      - alpha-release
    paths:
      - "backend/**"
      - ".github/workflows/ci-backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/ci-backend.yml"

env:
  IMAGE_NAME: devops-porto-get-together-backend
  IMAGE_TAG: 0.0.${{ github.run_number }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        run: |
          cd backend
          pytest

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} ./backend

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

  update-k8s-config:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout config repo
        uses: actions/checkout@v4
        with:
          repository: eduardopiairo/cicd-pipeline-workshop-config
          token: ${{ secrets.GH_PAT }}
          ref: alpha-release

      - name: Update backend image tag
        run: |
          sed -i "s|image: .*${{ env.IMAGE_NAME }}:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}|" k8s/backend/deployment.yaml

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b update-backend-tag-${{ env.IMAGE_TAG }}
          git add k8s/backend/deployment.yaml
          git commit -m "chore: update backend image tag to ${{ env.IMAGE_TAG }}"
          git push origin update-backend-tag-${{ env.IMAGE_TAG }}
          gh pr create \
            --repo eduardopiairo/cicd-pipeline-workshop-config \
            --title "chore: update backend image tag to ${{ env.IMAGE_TAG }}" \
            --body "Automated PR to update backend image tag to \`${{ env.IMAGE_TAG }}\`." \
            --base alpha-release
