version: '3.8'

services:
  postgres:
    build: ./database
    environment:
      POSTGRES_INITDB_ARGS: "-U postgres"
      POSTGRES_PASSWORD: postgres
      WORKSHOP_USER_PASSWORD: workshop_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  flyway:
    image: flyway/flyway:9.22.3-alpine
    command: >
      -url=jdbc:postgresql://postgres:5432/workshop_db
      -user=workshop_user
      -password=workshop_pass
      -locations=filesystem:/flyway/sql
      migrate
    volumes:
      - ./database/migrations:/flyway/sql
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://workshop_user:workshop_pass@postgres:5432/workshop_db
      APP_ENV: development
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

volumes:
  postgres_data:
